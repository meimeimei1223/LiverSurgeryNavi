name: Build
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build-ubuntu:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libglew-dev libglfw3-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxext-dev
      - name: Download ONNX Runtime
        run: |
          wget -q https://github.com/microsoft/onnxruntime/releases/download/v1.15.1/onnxruntime-linux-x64-1.15.1.tgz
          tar xf onnxruntime-linux-x64-1.15.1.tgz
          rm onnxruntime-linux-x64-1.15.1.tgz
      - name: Download ONNX models
        run: |
          pip install huggingface_hub onnx protobuf
          mkdir -p models
          python3 -c "
          from huggingface_hub import hf_hub_download
          import onnx, os
          print('Downloading Depth Anything V3 Small...')
          p = hf_hub_download(repo_id='onnx-community/depth-anything-v3-small', filename='onnx/model.onnx')
          try:
              d = hf_hub_download(repo_id='onnx-community/depth-anything-v3-small', filename='onnx/model.onnx_data')
              m = onnx.load(p)
              onnx.save(m, 'models/depth_anything_v3_small.onnx', save_as_external_data=False)
              print('  Converted to single file')
          except Exception:
              import shutil
              shutil.copy(p, 'models/depth_anything_v3_small.onnx')
              print('  Copied single file')
          print('Downloading SAM2 encoder...')
          hf_hub_download(repo_id='vietanhdev/segment-anything-2-onnx-models', filename='sam2_hiera_tiny.encoder.onnx', local_dir='models/')
          print('Downloading SAM2 decoder...')
          hf_hub_download(repo_id='vietanhdev/segment-anything-2-onnx-models', filename='sam2_hiera_tiny.decoder.onnx', local_dir='models/')
          for f in os.listdir('models'):
              sz = os.path.getsize(os.path.join('models', f))
              print(f'  {f}: {sz/1024/1024:.1f} MB')
          "
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DONNXRUNTIME_ROOT=$PWD/onnxruntime-linux-x64-1.15.1
      - name: Build
        run: cmake --build build -j$(nproc)
      - name: Package
        run: |
          mkdir -p package/LiverSurgeryNavi/models
          cp build/bin/LiverSurgeryNavi package/LiverSurgeryNavi/
          cp build/bin/medsam2_da3_lite package/LiverSurgeryNavi/
          cp onnxruntime-linux-x64-1.15.1/lib/libonnxruntime.so* package/LiverSurgeryNavi/
          cp -r shaders package/LiverSurgeryNavi/
          cp -r data package/LiverSurgeryNavi/
          cp -r model package/LiverSurgeryNavi/
          cp -r depth_output package/LiverSurgeryNavi/
          cp models/depth_anything_v3_small.onnx package/LiverSurgeryNavi/models/
          cp models/sam2_hiera_tiny.encoder.onnx package/LiverSurgeryNavi/models/
          cp models/sam2_hiera_tiny.decoder.onnx package/LiverSurgeryNavi/models/
          cp README.md LICENSE package/LiverSurgeryNavi/
          echo "=== Package contents ==="
          du -sh package/LiverSurgeryNavi/models/*
          du -sh package/LiverSurgeryNavi/
      - uses: actions/upload-artifact@v4
        with:
          name: LiverSurgeryNavi-Linux
          path: package/LiverSurgeryNavi
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download ONNX Runtime
        shell: bash
        run: |
          curl -sL https://github.com/microsoft/onnxruntime/releases/download/v1.15.1/onnxruntime-win-x64-1.15.1.zip -o ort.zip
          unzip -q ort.zip
          rm ort.zip
      - name: Download ONNX models
        shell: bash
        run: |
          pip install huggingface_hub onnx
          mkdir -p models
          python3 -c "
          from huggingface_hub import hf_hub_download
          import onnx, os
          print('Downloading Depth Anything V3 Small...')
          p = hf_hub_download(repo_id='onnx-community/depth-anything-v3-small', filename='onnx/model.onnx')
          try:
              d = hf_hub_download(repo_id='onnx-community/depth-anything-v3-small', filename='onnx/model.onnx_data')
              m = onnx.load(p)
              onnx.save(m, 'models/depth_anything_v3_small.onnx', save_as_external_data=False)
              print('  Converted to single file')
          except Exception:
              import shutil
              shutil.copy(p, 'models/depth_anything_v3_small.onnx')
              print('  Copied single file')
          print('Downloading SAM2 encoder...')
          hf_hub_download(repo_id='vietanhdev/segment-anything-2-onnx-models', filename='sam2_hiera_tiny.encoder.onnx', local_dir='models/')
          print('Downloading SAM2 decoder...')
          hf_hub_download(repo_id='vietanhdev/segment-anything-2-onnx-models', filename='sam2_hiera_tiny.decoder.onnx', local_dir='models/')
          for f in os.listdir('models'):
              sz = os.path.getsize(os.path.join('models', f))
              print(f'  {f}: {sz/1024/1024:.1f} MB')
          "
      - name: Configure
        shell: bash
        run: cmake -B build -G "Visual Studio 17 2022" -A x64 -DONNXRUNTIME_ROOT=$PWD/onnxruntime-win-x64-1.15.1
      - name: Build
        run: cmake --build build --config Release
      - name: Package
        shell: bash
        run: |
          mkdir -p package/LiverSurgeryNavi/models
          cp build/bin/Release/LiverSurgeryNavi.exe package/LiverSurgeryNavi/ 2>/dev/null || cp build/bin/LiverSurgeryNavi.exe package/LiverSurgeryNavi/
          cp build/bin/Release/medsam2_da3_lite.exe package/LiverSurgeryNavi/ 2>/dev/null || cp build/bin/medsam2_da3_lite.exe package/LiverSurgeryNavi/
          cp onnxruntime-win-x64-1.15.1/lib/onnxruntime.dll package/LiverSurgeryNavi/
          cp -r shaders package/LiverSurgeryNavi/
          cp -r data package/LiverSurgeryNavi/
          cp -r model package/LiverSurgeryNavi/
          cp -r depth_output package/LiverSurgeryNavi/
          cp models/depth_anything_v3_small.onnx package/LiverSurgeryNavi/models/
          cp models/sam2_hiera_tiny.encoder.onnx package/LiverSurgeryNavi/models/
          cp models/sam2_hiera_tiny.decoder.onnx package/LiverSurgeryNavi/models/
          cp README.md LICENSE package/LiverSurgeryNavi/
      - uses: actions/upload-artifact@v4
        with:
          name: LiverSurgeryNavi-Windows
          path: package/LiverSurgeryNavi
